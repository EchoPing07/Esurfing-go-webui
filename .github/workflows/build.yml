name: build
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.0.0). Leave empty for auto-detect.'
        required: false
        default: ''

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.getver.outputs.version }}
      tag: ${{ steps.getver.outputs.tag }}
    steps:
      - name: Get Version
        id: getver
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
            TAG="v${VERSION}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            TAG="dev"
            VERSION="0.0.0"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: [version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - GOOS: linux
            GOARCH: amd64
            deb_arch: amd64
            opkg_arch: x86_64
          - GOOS: linux
            GOARCH: arm
            GOARM: 7
            deb_arch: armhf
            opkg_arch: arm_cortex-a9
          - GOOS: linux
            GOARCH: arm64
            deb_arch: arm64
            opkg_arch: aarch64
          - GOOS: linux
            GOARCH: mips
            ENV: GOMIPS=softfloat
            opkg_arch: mips_24kc
          - GOOS: linux
            GOARCH: mipsle
            ENV: GOMIPS=softfloat
            opkg_arch: mipsel_24kc
          - GOOS: linux
            GOARCH: mips64
            ENV: GOMIPS=softfloat
          - GOOS: linux
            GOARCH: mips64le
            ENV: GOMIPS=softfloat
          - GOOS: linux
            GOARCH: riscv64

          # Windows
          - GOOS: windows
            GOARCH: amd64
            ext: .exe
          - GOOS: windows
            GOARCH: arm64
            ext: .exe

          # macOS
          - GOOS: darwin
            GOARCH: amd64
          - GOOS: darwin
            GOARCH: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
          check-latest: true

      - name: Prepare Build Environment
        run: mkdir -p dist

      - name: Build Binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
          GOARM: ${{ matrix.GOARM || '' }}
          VERSION: ${{ needs.version.outputs.version }}
          EXT: ${{ matrix.ext || '' }}
        run: |
          if [ -n "${{ matrix.ENV }}" ]; then
            export ${{ matrix.ENV }}
          fi
          OUTPUT="dist/esurfing-go-webui-${VERSION}-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "$OUTPUT" .

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.GOOS }}-${{ matrix.GOARCH }}${{ matrix.ext || '' }}
          path: dist/esurfing-go-webui-*

      - name: Build Deb Package
        if: ${{ matrix.deb_arch != '' }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ARCH="${{ matrix.deb_arch }}"
          PKG_NAME="esurfing-go-webui_${VERSION}_${ARCH}"
          PKG_DIR="deb-pkg/${PKG_NAME}"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/etc/esurfing-webui"
          mkdir -p "${PKG_DIR}/var/lib/esurfing-webui"
          mkdir -p "${PKG_DIR}/lib/systemd/system"

          cp "dist/esurfing-go-webui-${VERSION}-linux-${{ matrix.GOARCH }}" "${PKG_DIR}/usr/bin/esurfing-go-webui"
          chmod 755 "${PKG_DIR}/usr/bin/esurfing-go-webui"
          cp "packaging/deb/esurfing-go-webui.service" "${PKG_DIR}/lib/systemd/system/"

          printf 'Package: esurfing-go-webui\nVersion: %s\nSection: net\nPriority: optional\nArchitecture: %s\nMaintainer: DreamwareN\nDescription: Esurfing campus network authentication client with web UI\n' "${VERSION}" "${ARCH}" > "${PKG_DIR}/DEBIAN/control"

          printf '#!/bin/sh\nset -e\nif [ -d /run/systemd/system ]; then\n  systemctl daemon-reload\n  systemctl enable esurfing-go-webui.service\n  systemctl start esurfing-go-webui.service || true\nfi\n' > "${PKG_DIR}/DEBIAN/postinst"
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          printf '#!/bin/sh\nset -e\nif [ -d /run/systemd/system ]; then\n  systemctl stop esurfing-go-webui.service || true\n  systemctl disable esurfing-go-webui.service || true\nfi\n' > "${PKG_DIR}/DEBIAN/prerm"
          chmod 755 "${PKG_DIR}/DEBIAN/prerm"

          dpkg-deb --root-owner-group --build "${PKG_DIR}" "dist/${PKG_NAME}.deb"

      - name: Upload Deb Artifacts
        if: ${{ matrix.deb_arch != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: dist/*.deb

      - name: Build Opkg Package
        if: ${{ matrix.opkg_arch != '' }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ARCH="${{ matrix.opkg_arch }}"
          PKG_NAME="esurfing-go-webui_${VERSION}_${ARCH}"
          IPK_DIR="opkg-pkg/${PKG_NAME}"
          WORK_DIR="$(pwd)"

          mkdir -p "${IPK_DIR}/data/usr/bin"
          mkdir -p "${IPK_DIR}/data/etc/esurfing-webui"
          mkdir -p "${IPK_DIR}/data/etc/init.d"
          mkdir -p "${IPK_DIR}/control"

          cp "dist/esurfing-go-webui-${VERSION}-linux-${{ matrix.GOARCH }}" "${IPK_DIR}/data/usr/bin/esurfing-go-webui"
          chmod 755 "${IPK_DIR}/data/usr/bin/esurfing-go-webui"
          cp "packaging/opkg/esurfing-go-webui" "${IPK_DIR}/data/etc/init.d/esurfing-go-webui"
          chmod 755 "${IPK_DIR}/data/etc/init.d/esurfing-go-webui"

          INSTALLED_SIZE=$(du -sk "${IPK_DIR}/data" | cut -f1)

          printf 'Package: esurfing-go-webui\nVersion: %s\nDepends: libc\nSource: github.com/DreamwareN/Esurfing-go-webui\nSection: net\nArchitecture: %s\nMaintainer: DreamwareN\nDescription: Esurfing campus network authentication client with web UI\nInstalled-Size: %s\n' "${VERSION}" "${ARCH}" "${INSTALLED_SIZE}" > "${IPK_DIR}/control/control"

          printf '#!/bin/sh\n/etc/init.d/esurfing-go-webui enable\n/etc/init.d/esurfing-go-webui start\n' > "${IPK_DIR}/control/postinst"
          chmod 755 "${IPK_DIR}/control/postinst"

          printf '#!/bin/sh\n/etc/init.d/esurfing-go-webui stop\n/etc/init.d/esurfing-go-webui disable\n' > "${IPK_DIR}/control/prerm"
          chmod 755 "${IPK_DIR}/control/prerm"

          cd "${IPK_DIR}/data"
          tar -czf "${WORK_DIR}/data.tar.gz" --format=gnu --owner=0 --group=0 --transform='s,^\./,,' -C . .
          cd "${WORK_DIR}/${IPK_DIR}/control"
          tar -czf "${WORK_DIR}/control.tar.gz" --format=gnu --owner=0 --group=0 control postinst prerm
          cd "${WORK_DIR}"

          echo "2.0" > debian-binary
          python3 packaging/make_ipk.py "dist/${PKG_NAME}.ipk" debian-binary data.tar.gz control.tar.gz

          # Verify ipk structure
          python3 -c "
          import sys
          with open('dist/${PKG_NAME}.ipk', 'rb') as f:
              magic = f.read(8)
              print(f'Magic: {magic}')
              assert magic == b'!<arch>\n', 'Bad magic!'
              for i in range(3):
                  hdr = f.read(60)
                  if len(hdr) < 60:
                      print(f'Entry {i}: TRUNCATED HEADER')
                      break
                  name = hdr[0:16].rstrip(b' ')
                  size = int(hdr[48:58].strip())
                  magic_end = hdr[58:60]
                  print(f'Entry {i}: name={name!r} size={size} magic_end={magic_end!r}')
                  f.read(size)
                  if size % 2:
                      f.read(1)
          "

      - name: Upload Opkg Artifacts
        if: ${{ matrix.opkg_arch != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: opkg-${{ matrix.opkg_arch }}
          path: dist/*.ipk

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate Checksums
        run: |
          cd dist
          find . -type f \( -name '*.exe' -o -name '*.deb' -o -name '*.ipk' -o -name 'esurfing-go-webui-*' \) \
            -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
